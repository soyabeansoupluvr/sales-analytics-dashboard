name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Least-privilege default: workflow steps get read-only access to the
# repository unless a job explicitly asks for more. Aligns to the NIST SSDF
# practice of running build automation with the minimum privileges it needs.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a rapid series of pushes does
# not leave stale queued jobs consuming runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, format, secret-scan, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to inspect prior commits, not just
          # the tip of the branch.
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 src/ tests/ --max-line-length=100 --statistics

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Secret scan with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required by the action for private
          # organizations; public repositories run without it.

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml --cov-report=term --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
